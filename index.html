<!DOCTYPE html>
<html>
<head>
  <title>My Online Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>MyShop</h2>
  </div>

  <div class="banner">
    <h1>Welcome to My Online Shop</h1>

  </div>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Product 1</h3>
      <p>Price: 500 BDT</p>
     <button onclick="buyNow('Product 1')">Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Product 2</h3>
      <p>Price: 800 BDT</p>
      <button onclick="buyNow('Product 2')">Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Product 3</h3>
      <p>Price: 1200 BDT</p>
      <button onclick="buyNow('Product 3')">Buy Now</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
