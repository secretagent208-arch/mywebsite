<!DOCTYPE html>
<html>
<head>
  <title>My Online Shop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="logo">🛒 MyShop</div>

  <input type="text" id="search" placeholder="Search products...">

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
  </div>
</div>

<div class="banner">
  <h1>Welcome to My Online Shop</h1>
  <p>Best Products • Best Price</p>
</div>

<div class="products">

  <!-- PRODUCT 1 -->
  <div class="card">
    <img src="cwt-12004.png" alt="Product Image" width="200">

    <h3>Product 1</h3>
    <p>Price: 500 BDT</p>

    <button onclick="buyNow('Product 1')">Buy Now</button>
    <button onclick="addToCart('Product 1', 500)">Add to Cart</button>
  </div>

</div>

<script>
let cartCount = 0;

function addToCart(name, price){
  cartCount++;
  document.getElementById("cartCount").innerText = cartCount;

  alert(name + " added to cart. Price: " + price + " BDT");
}

function buyNow(name){
  alert("Buying " + name);
}
</script>

</body>
</html>
